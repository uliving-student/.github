name: PR Release

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
    branches:
      - staging

permissions:
  contents: read
  pull-requests: write

jobs:
  open-prod-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Create PR from same source branch to prod
        uses: actions/github-script@v7
        with:
          script: |
            const headBranch = context.payload.pull_request.head.ref;
            const baseBranch = 'main';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const originalPr = context.payload.pull_request;

            if (headBranch === baseBranch) {
              core.info('A branch de origem já é prod. Nada a fazer.');
              return;
            }

            const existing = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head: `${owner}:${headBranch}`,
              base: baseBranch
            });

            if (existing.data.length > 0) {
              core.info(`Já existe PR aberta para prod: #${existing.data[0].number}`);
              return;
            }

            const created = await github.rest.pulls.create({
              owner,
              repo,
              head: headBranch,
              base: baseBranch,
              title: `release-${headBranch} - ${originalPr.title}`,
              body: `PR criada automaticamente a partir da #${originalPr.number}, aberta para stage.`
            });

            core.info(`PR criada com sucesso: #${created.data.number}`);